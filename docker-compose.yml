services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legal-agent-postgres
    environment:
      POSTGRES_DB: legal_agent
      POSTGRES_USER: legal_agent
      POSTGRES_PASSWORD: legal_agent
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - legal_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_agent -d legal_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: legal-agent-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://legal_agent:legal_agent@postgres:5432/legal_agent
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - CONVERSATION_HISTORY_LIMIT=${CONVERSATION_HISTORY_LIMIT:-6}
      - DEMO_FAST_MODE=${DEMO_FAST_MODE:-true}
      - SKIP_QUERY_REWRITE=${SKIP_QUERY_REWRITE:-true}
      - SKIP_RERANK=${SKIP_RERANK:-true}
      - FAST_RETRIEVAL_TOP_K=${FAST_RETRIEVAL_TOP_K:-3}
      - WARMUP_RETRIEVAL=${WARMUP_RETRIEVAL:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: >
      sh -c "
        echo '[init] Waiting for postgres...' &&
        sleep 3 &&
        alembic upgrade head &&
        echo '[init] Starting server...' &&
        uvicorn src.api:app --host 0.0.0.0 --port 8000
      "

volumes:
  legal_agent_pgdata:
